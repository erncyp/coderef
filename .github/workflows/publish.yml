name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Tests before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publisher (OIDC — no token needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
